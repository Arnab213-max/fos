<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Order System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Food Order System</h1>
            <p> Using a CRUD Operations - Create, Read, Update, Delete</p>
        </header>

        <div class="actions">
            <button class="btn btn-primary" onclick="showCreateOrderForm()">Create New Order</button>
            <button class="btn btn-secondary" onclick="loadOrders()">Refresh Orders</button>
        </div>
        <div id="orderModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>Create New Order</h2>
                <form id="orderForm">
                    <div class="form-section">
                        <h3>Customer Information</h3>
                        <div class="form-group">
                            <label for="customerName">Name:</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone:</label>
                            <input type="tel" id="customerPhone" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Email:</label>
                            <input type="email" id="customerEmail">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Food Items</h3>
                        <div id="foodItems">
                            <div class="food-item">
                                <input type="text" placeholder="Item Name" class="item-name" required>
                                <input type="number" placeholder="Quantity" class="item-quantity" min="1" required>
                                <input type="number" placeholder="Price" class="item-price" min="0" step="0.01" required>
                                <button type="button" class="btn-remove" onclick="removeFoodItem(this)">×</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-item" onclick="addFoodItem()">+ Add Item</button>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Place Order</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="updateModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeUpdateModal()">&times;</span>
                <h2>Update Order Status</h2>
                <form id="updateForm">
                    <input type="hidden" id="updateOrderId">
                    <div class="form-group">
                        <label for="orderStatus">Status:</label>
                        <select id="orderStatus" required>
                            <option value="pending">Pending</option>
                            <option value="preparing">Preparing</option>
                            <option value="ready">Ready</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeUpdateModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Update Status</button>
                    </div>
                </form>
            </div>
        </div>

     
        <div class="orders-section">
            <h2>All Orders</h2>
            <div id="ordersList" class="orders-grid">
              
                <div class="loading">Loading orders...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
